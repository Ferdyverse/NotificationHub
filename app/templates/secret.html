{% extends "base.html" %}
{% block content %}

<div class="mb-8">
  <h1>New Webhook Secret</h1>
  <p>{{ label }}</p>
</div>

<div class="alert alert-warning mb-6">
  <span class="alert-icon">&#9888;&#65039;</span>
  <div><strong>Copy this secret now.</strong> It will not be shown again after you leave this page.</div>
</div>

<div class="card mb-6">
  <p class="section-title mb-3">Secret</p>
  <div class="flex gap-3 items-center bg-slate-950/60 border border-slate-600/40 rounded-lg p-4">
    <code class="flex-1 text-base font-mono text-emerald-300 break-all select-all" style="background:none; border:none; padding:0;">{{ secret }}</code>
    <button
      type="button"
      class="btn btn-secondary btn-sm flex-shrink-0"
      onclick="copySecret(this)"
      data-secret="{{ secret }}"
    >&#128203; Copy</button>
  </div>
</div>

<div>
  <a href="/ui/ingresses" class="btn btn-secondary">&#8592; Back to Ingresses</a>
</div>

<script>
function copySecret(button) {
  var secret = button.getAttribute('data-secret');
  navigator.clipboard.writeText(secret).then(function() {
    var orig = button.textContent;
    button.textContent = 'Copied!';
    setTimeout(function() { button.textContent = orig; }, 2000);
  }).catch(function() { alert('Failed to copy to clipboard'); });
}
</script>

{% endblock %}
