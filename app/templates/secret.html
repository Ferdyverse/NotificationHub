{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">New Secret</h1>
{% if request.session.get('flash') %}
  <div class="mb-4 bg-emerald-900/40 border border-emerald-700 rounded-lg p-3 text-emerald-200">
    {{ request.session.pop('flash') }}
  </div>
{% endif %}
<div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
  <div class="text-sm text-slate-400">{{ label }}</div>
  <div class="mt-2 font-mono text-lg">{{ secret }}</div>
  <p class="text-xs text-slate-500 mt-2">Copy this value now. It will not be shown again.</p>
</div>
<div class="mt-4">
  <a class="px-4 py-2 rounded border border-slate-700" href="/ui/ingresses">Back</a>
</div>
{% endblock %}
