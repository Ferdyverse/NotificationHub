{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Edit Rule</h1>
{% if error %}
  <div class="mb-4 bg-rose-900/40 border border-rose-700 rounded-lg p-3 text-rose-200">
    {{ error }}
  </div>
{% endif %}
{% if flash %}
  <div class="mb-4 bg-emerald-900/40 border border-emerald-700 rounded-lg p-3 text-emerald-200">
    {{ flash }}
  </div>
{% endif %}
<form method="post" action="/ui/rules/{{ rule.id }}" class="space-y-3 bg-slate-900 border border-slate-800 rounded-lg p-4">
  <div>
    <label class="block text-sm text-slate-300">Name</label>
    <input name="name" value="{{ rule.name }}" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" required />
  </div>
  <div>
    <label class="block text-sm text-slate-300">Order</label>
    <input name="order" type="number" value="{{ rule.order }}" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" />
  </div>
  <div>
    <label class="block text-sm text-slate-300">Ingress</label>
    <select name="ingress_id" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
      <option value="">All</option>
      {% for ingress in ingresses %}
        <option value="{{ ingress.id }}" {% if rule.ingress_id == ingress.id %}selected{% endif %}>{{ ingress.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm text-slate-300">Route</label>
    <select name="route_id" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" required>
      {% for route in routes %}
        <option value="{{ route.id }}" {% if rule.route_id == route.id %}selected{% endif %}>{{ route.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm text-slate-300">Template Override (optional)</label>
    <select name="template_id" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
      <option value="">None (use route/default)</option>
      {% for template in templates %}
        <option value="{{ template.id }}" {% if rule.template_id == template.id %}selected{% endif %}>{{ template.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm text-slate-300">Condition Type</label>
    <select name="condition_type" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" required>
      {% set cond = rule.conditions[0] if rule.conditions else {} %}
      <option value="always" {% if cond.type == "always" %}selected{% endif %}>always (no condition)</option>
      <option value="source_eq" {% if cond.type == "source_eq" %}selected{% endif %}>source == value</option>
      <option value="event_startswith" {% if cond.type == "event_startswith" %}selected{% endif %}>event startswith</option>
      <option value="severity_eq" {% if cond.type == "severity_eq" %}selected{% endif %}>severity == value</option>
      <option value="tags_contains" {% if cond.type == "tags_contains" %}selected{% endif %}>tags contains</option>
      <option value="entity_eq" {% if cond.type == "entity_eq" %}selected{% endif %}>entities.key == value</option>
    </select>
  </div>
  <div>
    <label class="block text-sm text-slate-300">Entity Key (only for entity_eq)</label>
    <input name="condition_key" value="{{ cond.key if cond.key }}" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" />
  </div>
  <div>
    <label class="block text-sm text-slate-300">Condition Value</label>
    <input name="condition_value" value="{{ cond.value if cond.value }}" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" placeholder="Value to match" />
  </div>
  <div class="flex gap-3">
    <button class="bg-emerald-500 text-slate-900 px-4 py-2 rounded font-semibold">Save</button>
    <a class="px-4 py-2 rounded border border-slate-700" href="/ui/rules">Back</a>
  </div>
</form>
{% endblock %}
