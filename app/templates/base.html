<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NotificationHub</title>
    <link rel="icon" href="/static/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
      <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap gap-3 items-center">
        <div class="font-semibold">NotificationHub</div>
        <a class="text-slate-300 hover:text-white" href="/ui/ingresses">Ingress</a>
        <a class="text-slate-300 hover:text-white" href="/ui/routes">Routes</a>
        <a class="text-slate-300 hover:text-white" href="/ui/templates">Templates</a>
        <a class="text-slate-300 hover:text-white" href="/ui/events">Events</a>
        <a class="text-slate-300 hover:text-white" href="/ui/backups">Backups</a>
      </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-6">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
