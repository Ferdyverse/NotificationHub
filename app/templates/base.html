<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NotificationHub</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <nav class="sticky top-0 z-50">
      <div class="container flex flex-wrap items-center gap-4 py-3">
        <a href="/" class="nav-brand">&#128276; NotificationHub</a>
        <div class="flex flex-wrap gap-1 ml-auto items-center text-sm">
          <a href="/ui/ingresses" class="nav-link">Ingresses</a>
          <a href="/ui/routes" class="nav-link">Destinations</a>
          <a href="/ui/templates" class="nav-link">Templates</a>
          <a href="/ui/events" class="nav-link">Events</a>
          <a href="/ui/backups" class="nav-link">Backups</a>
        </div>
      </div>
    </nav>
    <main class="container py-8" style="flex: 1 0 auto;">
      {% block content %}{% endblock %}
    </main>
    <footer style="flex-shrink: 0;" class="border-t border-gray-700 py-4 text-sm text-gray-500">
      <div class="flex items-center justify-center gap-2 flex-wrap">
        <span>&copy; {{ current_year() }}</span>
        <a href="https://github.com/Ferdyverse" target="_blank" rel="noopener noreferrer" class="hover:text-gray-300">Ferdyverse</a>
        <span>&mdash; NotificationHub &mdash;</span>
        <a href="https://github.com/Ferdyverse/NotificationHub" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 hover:text-gray-300 underline">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:inline;vertical-align:middle;">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </a>
      </div>
    </footer>
    {% block scripts %}{% endblock %}
    <script>
      // Highlight active nav link based on current path
      var path = window.location.pathname;
      document.querySelectorAll('nav a.nav-link').forEach(function(a) {
        var href = a.getAttribute('href');
        if (href && href !== '/' && path.startsWith(href)) {
          a.classList.add('active');
        }
      });
    </script>
  </body>
</html>
