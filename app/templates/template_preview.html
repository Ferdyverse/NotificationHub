{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Preview: {{ template.name }}</h1>
{% if error %}
  <div class="bg-rose-900/40 border border-rose-700 rounded-lg p-4 text-rose-200">
    Template render error: {{ error }}
  </div>
{% else %}
  {% if rendered_title %}
    <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 mb-3">
      <div class="text-xs text-slate-400 mb-1">Rendered Title</div>
      <div class="font-semibold">{{ rendered_title }}</div>
    </div>
  {% endif %}
  <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 whitespace-pre-wrap">
    {{ rendered }}
  </div>
{% endif %}
<div class="mt-4">
  <a class="px-4 py-2 rounded border border-slate-700" href="/ui/templates/{{ template.id }}">Back</a>
</div>
{% endblock %}
