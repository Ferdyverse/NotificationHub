---

services:
  notificationhub:
    image: ghcr.io/ferdyverse/notificationhub:staging
    container_name: notification-hub
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin

      # Database
      - DATABASE_URL=sqlite:////data/app.db
      - BASE_URL=http://localhost:8080

      # UI Auth (recommended)
      - UI_BASIC_AUTH_USER=testuser
      - UI_BASIC_AUTH_PASS=test1234

      # Session signing secret (required in production).
      # Example: openssl rand -hex 32
      - SESSION_SECRET=change-this-to-a-long-random-secret

      # Routing Defaults
      - DEFAULT_DEDUPE_SECONDS=60
      - DEFAULT_RATE_LIMIT_PER_MIN=60

    volumes:
      - ./data:/data

    ports:
      - "8080:8080"

    networks:
      - notify_net

networks:
  notify_net:
    driver: bridge
